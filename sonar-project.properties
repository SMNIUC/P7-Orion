# =============================================================================
# SonarQube Cloud - Orion MicroCRM (analyse qualite & securite)
#
# Projet unique couvrant le monorepo (backend Java + frontend Angular).
# Consomme par le job "sonar" du workflow .github/workflows/ci-cd.yml via
# l'action officielle SonarSource/sonarqube-scan-action.
#
# Organisation et projet configures dans SonarQube Cloud (organisation "smniuc",
# projet "SMNIUC_P7-Orion"). Le jeton d'authentification n'est JAMAIS ici : il est
# fourni par le secret GitHub Actions SONAR_TOKEN (variable d'environnement).
# =============================================================================

sonar.organization=smniuc
sonar.projectKey=SMNIUC_P7-Orion
sonar.projectName=Orion MicroCRM
sonar.sourceEncoding=UTF-8

# --- Perimetre d'analyse --------------------------------------------------
# Code de production analyse : backend Java + frontend Angular.
sonar.sources=back/src/main/java,front/src
# Code de test (backend). Les specs Angular sont exclues de l'analyse ci-dessous.
sonar.tests=back/src/test/java

# Exclusions : specs front (traitees via la couverture, pas analysees comme source),
# artefacts de build et dependances.
sonar.exclusions=front/src/**/*.spec.ts,**/node_modules/**,**/dist/**,**/build/**

# --- Backend Java : classes compilees + couverture JaCoCo -----------------
sonar.java.binaries=back/build/classes/java/main
sonar.java.test.binaries=back/build/classes/java/test
sonar.coverage.jacoco.xmlReportPaths=back/build/reports/jacoco/test/jacocoTestReport.xml

# --- Frontend Angular : couverture LCOV -----------------------------------
sonar.javascript.lcov.reportPaths=front/coverage/microcrm/lcov.info
