# =============================================================================
# Profil "elk" - configuration de journalisation pour le monitoring local.
#
# Active uniquement par docker-compose.elk.yml (SPRING_PROFILES_ACTIVE=elk) :
# un demarrage normal (jar, docker compose up, CI) garde les logs console
# lisibles par un humain et n'ecrit aucun fichier.
#
# Regroupe ici plutot qu'en variables d'environnement dans le compose : le
# motif d'access log ci-dessous est du JSON (guillemets, accolades, quotes),
# illisible et fragile une fois echappe en YAML.
# =============================================================================

# --- 1. Logs applicatifs -> JSON ECS ----------------------------------------
# Spring Boot 3.4+ produit nativement de l'Elastic Common Schema : aucune
# dependance (logstash-logback-encoder) ni logback-spring.xml a maintenir.
# Le champ service.name est alimente par spring.application.name.
logging.structured.format.file=ecs
logging.file.name=/var/log/microcrm/back.json

# Rotation : borne la taille du volume de logs (10 Mo x 3 fichiers).
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=3

# --- 2. Access log Tomcat -> JSON -------------------------------------------
# INDISPENSABLE, et non redondant avec le point 1 : les logs applicatifs
# Spring ne contiennent NI le statut HTTP NI la duree des requetes. Par
# ailleurs les access logs de Caddy ne couvrent que les fichiers statiques :
# le navigateur appelle l'API en direct sur :8080 (cf. API_BASE_URL), sans
# passer par le front. Sans cet access log, l'API n'a donc AUCUNE trace de
# requete -> ni taux d'erreur, ni temps de reponse dans le tableau de bord.
#
# Il donne aussi la verite terrain sur les statuts : Spring Data REST
# journalise un HTTP 500 au niveau WARN (RepositoryRestExceptionHandler),
# donc un suivi base sur log.level=ERROR seul manquerait les erreurs 5xx.
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=/var/log/microcrm
server.tomcat.accesslog.prefix=back-access
server.tomcat.accesslog.suffix=.json
# Tomcat bufferise ses access logs par defaut : les lignes n'atteignent le
# fichier qu'apres un delai variable, ce qui retarde d'autant leur apparition
# dans Kibana et rend l'observation temps reel trompeuse. Cout negligeable au
# volume de ce projet.
server.tomcat.accesslog.buffered=false
# Un fichier par jour -> rotation naturelle, aligne sur l'index ES journalier.
server.tomcat.accesslog.file-date-format=.yyyy-MM-dd

# Motif JSON : evite un filtre grok cote Logstash (couteux et fragile).
#
# /!\ Unite de duree : on utilise %{ms}T (millisecondes, explicite) et NON %D.
#     Sous Tomcat 10.1, %D est exprime en MICROsecondes : verifie sur ce projet
#     (une requete mesuree a ~7 ms par curl etait journalisee "29125"). Le
#     prendre pour des millisecondes gonflait la latence d'un facteur 1000.
#
# %b = octets envoyes, vaut "-" si 0 -> garde en chaine pour ne pas produire
# un JSON invalide.
server.tomcat.accesslog.pattern={"ts":"%{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}t","method":"%m","uri":"%U","status":%s,"duration_ms":%{ms}T,"bytes":"%b","ip":"%a"}
