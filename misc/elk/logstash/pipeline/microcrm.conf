# =============================================================================
# Pipeline Logstash - MicroCRM
#
# Objectif : centraliser TROIS sources de logs applicatifs dans Elasticsearch,
# avec le minimum de traitement (recommandation : "pipeline minimal").
#
#   back         -> Spring Boot, JSON *ECS natif* (Boot 3.4+, aucune dependance)
#                   deja au bon schema : rien a transformer.
#   back-access  -> access log Tomcat, JSON (statut HTTP + duree des requetes).
#                   Seule source de mesure de PERFORMANCE et de TAUX D'ERREUR
#                   de l'API : les logs applicatifs Spring n'ont ni statut ni
#                   duree, et Caddy ne voit pas le trafic API (le navigateur
#                   appelle :8080 en direct).
#   front        -> Caddy, JSON d'access log des fichiers statiques.
#
# Les deux access logs ont un schema *proprietaire* : ils sont normalises ici
# vers ECS pour cohabiter avec le back dans un seul index / data view.
#
# Le "gros" du travail de structuration est fait a la SOURCE (ECS natif cote
# Spring, motifs JSON cote Tomcat et Caddy) plutot que par des filtres grok
# couteux et fragiles : c'est ce qui garde ce pipeline aussi court.
# =============================================================================

input {
  # Spring Boot : ECS natif -> aucun filtre necessaire en aval.
  file {
    path => "/var/log/microcrm/back.json"
    codec => json
    start_position => "beginning"
    # sincedb persiste l'offset de lecture : au redemarrage, Logstash reprend
    # ou il s'etait arrete au lieu de tout re-indexer (pas de doublons).
    sincedb_path => "/usr/share/logstash/data/sincedb_back"
    add_field => { "[event][dataset]" => "back" }
  }

  # Access log Tomcat : un fichier par jour (back-access.2026-07-17.json).
  file {
    path => "/var/log/microcrm/back-access*.json"
    codec => json
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_back_access"
    add_field => { "[event][dataset]" => "back-access" }
  }

  # Caddy : access logs JSON (codes HTTP + duree de traitement).
  file {
    path => "/var/log/microcrm/front.json"
    codec => json
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/sincedb_front"
    add_field => { "[event][dataset]" => "front" }
  }
}

filter {
  # --- Front (Caddy) : normalisation vers ECS -------------------------------
  if [event][dataset] == "front" {
    # "ts" de Caddy = epoch en secondes (flottant) -> @timestamp de l'evenement.
    # Sans cela, @timestamp vaudrait l'heure d'INGESTION et non celle de la
    # requete : toute analyse temporelle serait faussee.
    date {
      match => [ "ts", "UNIX" ]
      target => "@timestamp"
      remove_field => [ "ts" ]
    }

    # Caddy exprime "duration" en SECONDES (flottant), Tomcat en millisecondes.
    # On convertit ici pour que les deux sources alimentent UN SEUL champ
    # event.duration_ms -> une seule visualisation de temps de reponse.
    ruby {
      code => 'd = event.get("duration"); event.set("[event][duration_ms]", (d * 1000).round(3)) if d'
      remove_field => [ "duration" ]
    }

    mutate {
      # Ordre interne fixe de mutate : rename s'execute AVANT uppercase,
      # d'ou le uppercase sur le champ DEJA renomme.
      rename => {
        "level"    => "[log][level]"
        "msg"      => "message"
        "status"   => "[http][response][status_code]"
        "size"     => "[http][response][body][bytes]"
      }
      # Caddy ecrit "info"/"error", Spring "INFO"/"ERROR" : on aligne pour
      # pouvoir filtrer les deux sources sur un seul champ log.level.
      uppercase => [ "[log][level]" ]
      add_field => { "[service][name]" => "microcrm-front" }
    }

    # Champs ECS utiles au dashboard, extraits de l'objet "request" de Caddy.
    mutate {
      rename => {
        "[request][method]"    => "[http][request][method]"
        "[request][uri]"       => "[url][path]"
        "[request][remote_ip]" => "[client][ip]"
      }
    }

    # Un acces HTTP en 4xx/5xx est logue "info" par Caddy (la requete a bien
    # ete traitee). On releve le niveau pour que les erreurs applicatives
    # remontent dans les memes visualisations que les erreurs du back.
    if [http][response][status_code] and [http][response][status_code] >= 400 {
      mutate { replace => { "[log][level]" => "ERROR" } }
    }
  }

  # --- Back : access log Tomcat, normalisation vers ECS ---------------------
  if [event][dataset] == "back-access" {
    date {
      match => [ "ts", "ISO8601" ]
      target => "@timestamp"
      remove_field => [ "ts" ]
    }

    mutate {
      rename => {
        "method"      => "[http][request][method]"
        "uri"         => "[url][path]"
        "status"      => "[http][response][status_code]"
        "duration_ms" => "[event][duration_ms]"
        "ip"          => "[client][ip]"
      }
      add_field => { "[service][name]" => "microcrm" }
      # "bytes" vaut "-" quand la reponse est vide : on ne le convertit pas en
      # nombre, on le laisse tomber (l'info utile est deja dans le statut).
      remove_field => [ "bytes" ]
    }

    # Un access log n'a pas de niveau : on le derive du statut HTTP pour que
    # les erreurs API remontent dans les memes visualisations que le reste.
    if [http][response][status_code] >= 500 {
      mutate { add_field => { "[log][level]" => "ERROR" } }
    } else if [http][response][status_code] >= 400 {
      mutate { add_field => { "[log][level]" => "WARN" } }
    } else {
      mutate { add_field => { "[log][level]" => "INFO" } }
    }
  }

  # --- Commun ---------------------------------------------------------------
  mutate {
    remove_field => [
      # Bruit de transport : n'apporte rien une fois les champs extraits.
      "resp_headers", "logger", "bytes_read", "user_id", "request",
      # Logstash 8 (mode ECS) recopie la ligne brute complete dans
      # event.original : cela DOUBLE la taille de l'index et ferait entrer les
      # en-tetes de requete (User-Agent...) dans Elasticsearch sans utilite,
      # tous les champs exploitables ayant deja ete extraits ci-dessus.
      "[event][original]"
    ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Index journalier : facilite la purge (supprimer un jour = supprimer un
    # index) et borne la taille unitaire.
    index => "microcrm-logs-%{+YYYY.MM.dd}"
  }
}
